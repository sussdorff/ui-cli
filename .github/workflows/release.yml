name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Run unit tests
        run: uv run pytest tests/unit

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches VERSION
        env:
          VERSION_FROM_TAG: ${{ steps.version.outputs.VERSION }}
        run: |
          VERSION_FROM_FILE="$(cat VERSION)"
          if [ "$VERSION_FROM_TAG" != "$VERSION_FROM_FILE" ]; then
            echo "Tag version $VERSION_FROM_TAG does not match VERSION file $VERSION_FROM_FILE" >&2
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

      - name: Generate changelog for release
        run: |
          if command -v git-cliff >/dev/null 2>&1; then
            git cliff --latest --strip header > RELEASE_NOTES.md
          else
            echo "## Release ${GITHUB_REF_NAME}" > RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            git log --pretty=format:"- %s" "$(git describe --tags --abbrev=0 HEAD^)"..HEAD >> RELEASE_NOTES.md || true
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
